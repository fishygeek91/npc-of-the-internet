# Gitleaks config for NPC of the Internet (compatible with gitleaks 8.24.x used by CI).
# Extends the default rule set; allowlists cover TEST-ONLY fixtures only.

title = "npc-of-the-internet"

[extend]
useDefault = true

# Singular [allowlist] — required by gitleaks 8.24.x (CI pin via gitleaks-action).
