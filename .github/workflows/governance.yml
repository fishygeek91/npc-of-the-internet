name: Governance

on:
  pull_request:

jobs:
  docs-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute changed files
        id: diff
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD > changed.txt
          cat changed.txt
      - name: "Rule 1: source changes must update TASKS.md"
        if: "!contains(github.event.pull_request.labels.*.name, 'governance-exempt')"
        run: |
          if grep -qE '^(packages/.*/src/|spec/)' changed.txt && ! grep -q '^TASKS.md$' changed.txt; then
            echo "::error::This PR changes source or spec but does not update TASKS.md. Update the task status/notes, or add the 'governance-exempt' label (bug fixes on main, etc.)."
            exit 1
          fi
      - name: "Rule 2: behavior changes need a changeset"
        if: "!contains(github.event.pull_request.labels.*.name, 'no-changeset')"
        run: |
          if grep -qE '^packages/.*/src/' changed.txt && ! grep -q '^.changeset/' changed.txt; then
            echo "::error::Source changed but no changeset added. Run 'pnpm changeset', or add the 'no-changeset' label for refactors with no behavior change."
            exit 1
          fi
      - name: "Rule 3: OpenSoul extractability (no inward imports)"
        run: |
          if grep -rE "@npc/(runtime|immune|door-sdk|door-discord|atlas)" packages/osp-core/src packages/osp-cli/src spec/ 2>/dev/null; then
            echo "::error::osp-core/osp-cli/spec must not depend on other workspace packages (ENGINEERING.md D1 extractability)."
            exit 1
          fi
      - name: "Rule 4: CHANGELOG.md is generated, not edited"
        run: |
          if grep -q '^CHANGELOG.md$' changed.txt && ! grep -q '^.changeset/' changed.txt; then
            echo "::error::CHANGELOG.md is generated by changesets at release time. Do not edit it by hand (ENGINEERING.md D7)."
            exit 1
          fi
      - name: "Rule 5: spec verification rules ship with vectors"
        run: |
          if grep -qE '^spec/osp/records.md$' changed.txt && ! grep -qE '^(spec/osp/vectors/|packages/osp-core/)' changed.txt; then
            echo "::warning::spec/osp/records.md changed without touching vectors or osp-core. Reviewer: verify this is prose-only."
          fi
